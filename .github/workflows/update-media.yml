name: Update Profile Media Card

on:
  workflow_dispatch:
    inputs:
      movie_name:
        description: '电影/电视剧名称'
        required: true
        default: '大话西游'
      time_str:
        description: '播放时间或推荐评分 (e.g. 01:38:42 / 01:54:12)'
        required: true
        default: '01:38:42 / 01:54:12'
      footer_text:
        description: '偏好内容'
        required: true
        default: '偏好: 武侠 • 仙侠 • 古装 • 爱情 • 校园  |  追番: 凡人修仙传 • 剑来'

jobs:
  update-svgs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run update script
        run: |
          python scripts/update_media.py "${{ github.event.inputs.movie_name }}" "${{ github.event.inputs.time_str }}" "${{ github.event.inputs.footer_text }}"

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add static/media-dark.svg static/media-light.svg
          git diff-index --quiet HEAD || (git commit --amend --no-edit && git push --force)
