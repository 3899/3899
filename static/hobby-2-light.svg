<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 282 126" fill="none" width="282" height="126">
  <style>
    .item-bg {
      stroke: #e4e2e2;
      stroke-width: 1px;
      rx: 6px;
      fill: none;
    }
    .gray-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      fill: #586069;
    }
    .bold-highlight {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 12.5px;
      font-weight: bold;
      fill: #24292e;
    }
    .status-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10.5px;
      fill: #2ea44f;
    }
    .dot-color { fill: #2ea44f; filter: drop-shadow(0 0 3px #2ea44f); }
    @keyframes blink {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    .dot {
      animation: blink 2s infinite linear;
    }
  </style>
  
  <rect x="0.5" y="0.5" width="281" height="125" class="item-bg" />
  <text x="14" y="24" class="gray-text">Bambu 3D Printing</text>
  <text x="14" y="56" class="bold-highlight">Bambu Lab X2D 打样 • Fusion360 建模</text>
  <circle cx="19" cy="94" r="4.5" class="dot dot-color" />
  <text x="29" y="97.5" class="status-text">打印腔预热完成 • 吐丝打样中</text>
</svg>
