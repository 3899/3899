<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none" width="520" height="120">
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { height: 8px; y: 57px; }
      50% { height: 32px; y: 33px; }
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.12; }
    }
    .player-bg {
      stroke: #e4e2e2;
      stroke-width: 1px;
      rx: 8px;
      fill: none;
    }
    .reel-1 {
      animation: spin 7s linear infinite;
      transform-origin: 42px 38px;
    }
    .reel-2 {
      animation: spin 9s linear infinite;
      transform-origin: 68px 38px;
    }
    .beam {
      animation: flicker 1.2s infinite;
      fill: #ff8c00;
    }
    .eq-bar {
      animation: pulse 1.2s ease-in-out infinite;
      fill: #ff8c00;
    }
    .eq-1 { animation-delay: 0.2s; animation-duration: 0.8s; }
    .eq-2 { animation-delay: 0.4s; animation-duration: 1.2s; }
    .eq-3 { animation-delay: 0.1s; animation-duration: 0.9s; }
    .eq-4 { animation-delay: 0.5s; animation-duration: 1.1s; }
    
    .title-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: bold;
      fill: #ffffff;
    }
    .footer-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11.5px;
      fill: #8b949e;
    }
    .time-text {
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 10px;
      fill: #6b7280;
    }
    .progress-bg {
      fill: #374151;
    }
    .progress-bar {
      fill: #ff8c00;
    }
    .control-btn {
      fill: #c9d1d9;
      stroke: #c9d1d9;
      cursor: pointer;
    }
    .control-btn:hover {
      fill: #ff8c00;
      stroke: #ff8c00;
    }
  </style>

  <!-- Player Outer Border -->
  <rect x="0.5" y="0.5" width="519" height="119" class="player-bg" />

  <!-- Movie Projector Group (Left) -->
  <g transform="translate(0, 0)">
    <!-- Support arms for reels -->
    <line x1="42" y1="38" x2="48" y2="52" stroke="#8b949e" stroke-width="1.5" />
    <line x1="68" y1="38" x2="62" y2="52" stroke="#8b949e" stroke-width="1.5" />

    <!-- Reel 1 (Left) -->
    <g class="reel-1">
      <circle cx="42" cy="38" r="14" fill="none" stroke="#8b949e" stroke-width="1.2" />
      <circle cx="42" cy="38" r="3" fill="#8b949e" />
      <line x1="42" y1="24" x2="42" y2="52" stroke="#8b949e" stroke-width="1" />
      <line x1="29.9" y1="31" x2="54.1" y2="45" stroke="#8b949e" stroke-width="1" />
      <line x1="29.9" y1="45" x2="54.1" y2="31" stroke="#8b949e" stroke-width="1" />
    </g>

    <!-- Reel 2 (Right) -->
    <g class="reel-2">
      <circle cx="68" cy="38" r="14" fill="none" stroke="#8b949e" stroke-width="1.2" />
      <circle cx="68" cy="38" r="3" fill="#8b949e" />
      <line x1="68" y1="24" x2="68" y2="52" stroke="#8b949e" stroke-width="1" />
      <line x1="55.9" y1="31" x2="80.1" y2="45" stroke="#8b949e" stroke-width="1" />
      <line x1="55.9" y1="45" x2="80.1" y2="31" stroke="#8b949e" stroke-width="1" />
    </g>

    <!-- Projector Body -->
    <rect x="36" y="52" width="38" height="24" rx="3" fill="#1a1f26" stroke="#8b949e" stroke-width="1.2" />
    <path d="M 74 58 L 82 54 L 82 74 L 74 70 Z" fill="#1a1f26" stroke="#8b949e" stroke-width="1.2" />
    
    <!-- Tripod Legs -->
    <line x1="45" y1="76" x2="38" y2="92" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" />
    <line x1="65" y1="76" x2="72" y2="92" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" />
    <line x1="55" y1="76" x2="55" y2="94" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" />

    <!-- Light beam -->
    <polygon points="83,60 101,52 101,76 83,68" class="beam" />
  </g>

  <!-- Track Information (Center) -->
  <g transform="translate(120, 0)">
    <text x="0" y="31" class="title-text">大话西游</text>
    
    <!-- Progress Bar (Film timeline) -->
    <rect x="0" y="49" width="220" height="3.5" rx="1.75" class="progress-bg" />
    <rect x="0" y="49" width="185" height="3.5" rx="1.75" class="progress-bar" />
    <text x="230" y="53" class="time-text">01:38:42 / 01:54:12</text>

    <!-- Playback Controls -->
    <g transform="translate(0, 67)">
      <!-- Previous Button -->
      <g class="control-btn">
        <path d="M64 4 L64 14" stroke-width="2" stroke-linecap="round" />
        <path d="M76 4 L66 9 L76 14 Z" />
      </g>
      <!-- Play/Pause Button -->
      <g class="control-btn">
        <rect x="105" y="4" width="3" height="10" rx="1" />
        <rect x="112" y="4" width="3" height="10" rx="1" />
      </g>
      <!-- Next Button -->
      <g class="control-btn">
        <path d="M144 4 L154 9 L144 14 Z" />
        <path d="M156 4 L156 14" stroke-width="2" stroke-linecap="round" />
      </g>
    </g>
    
    <!-- Footer Remarks -->
    <text x="0" y="104" class="footer-text">偏好: 武侠 • 仙侠 • 古装 • 爱情 • 校园  丨  追番: 凡人修仙传 • 剑来</text>
  </g>

  <!-- Equalizer Animation (Right) -->
  <g transform="translate(470, 15)">
    <rect x="0" width="3.5" rx="1.75" class="eq-bar eq-1" />
    <rect x="7" width="3.5" rx="1.75" class="eq-bar eq-2" />
    <rect x="14" width="3.5" rx="1.75" class="eq-bar eq-3" />
    <rect x="21" width="3.5" rx="1.75" class="eq-bar eq-4" />
  </g>
</svg>
