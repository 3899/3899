<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 282 126" fill="none" width="282" height="126">
  <style>
    .item-bg {
      stroke: rgba(255, 255, 255, 0.15);
      stroke-width: 1px;
      rx: 6px;
      fill: none;
    }
    .gray-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      fill: #8b949e;
    }
    .bold-highlight {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 12.5px;
      font-weight: bold;
      fill: #ffffff;
    }
    .status-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10.5px;
      fill: #00BFFF;
    }
    .dot-color { fill: #00BFFF; filter: drop-shadow(0 0 3px #00BFFF); }
    @keyframes blink {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }
    .dot {
      animation: blink 2s infinite linear;
    }
  </style>
  
  <rect x="0.5" y="0.5" width="281" height="125" class="item-bg" />
  <text x="14" y="24" class="gray-text">Smart Home Automation</text>
  <text x="14" y="56" class="bold-highlight">Home Assistant • MIJIA 自动化中枢</text>
  <circle cx="19" cy="94" r="4.5" class="dot dot-color" />
  <text x="29" y="97.5" class="status-text">Home Assistant 正常运行 • 节点已组网</text>
</svg>
